# 主工作流名称：Python定时脚本 + 仓库活跃保持
name: Run Python Script on Schedule (No Commit)

# ====================== 全局配置 ======================
permissions:
  actions: write  # 保活任务需要的最小权限（Python脚本无需额外权限）

# ====================== 触发规则区（统一管理） ======================
on:
  schedule:
    - cron: "55 20 * * *"   # Python脚本定时，每天 UTC 时间 4 点执行（需要调整到你的时区）
    - cron: "55 19 1 * *"   # 每周一UTC 0点（北京时间8点）保持活跃
  workflow_dispatch:      # 可手动触发
    inputs:
      run_task:
        description: '选择要运行的任务'
        required: false
        default: 'python_script'
        type: choice
        options:
          - python_script  # 仅运行Python脚本
          - keep_alive     # 仅保持仓库活跃

# ====================== 任务区（完全拆分为两个独立Job） ======================
jobs:
  # ---------------------- 第一部分：Python脚本运行逻辑 ----------------------
  run-script:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '55 20 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_task == 'python_script') ||
      (github.event_name == 'workflow_dispatch' && !github.event.inputs.run_task)
    runs-on: windows-latest  # 分配的虚拟机环境
    environment: ConfigConvert  # 关键：指定使用的环境，才能访问对应的环境级Secret
    name: Run Python Scheduled Script  # 给Job起清晰的名字

    steps:
    # 步骤1：拉取代码
    - name: Checkout code
      uses: actions/checkout@v4  # 使用别人写好的运行脚本

    # 步骤2：配置Python环境
    - name: Set up Python
      uses: actions/setup-python@v4  # 使用别人写好的运行脚本
      with:
        python-version: "3.10"  # 传入脚本的参数

    # 步骤3：安装依赖
    - name: Install dependencies
      run: |
        pip install controller regex requests json5 PyYAML

    # 步骤4：运行脚本
    - name: Run my script
      run: |
        python main.py
      env:
        PYTHONIOENCODING: utf-8
        ACTIONS_STEP_DEBUG: true
        ACTIONS_RUNNER_DEBUG: true
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
        GIST_FILENAME: ${{ secrets.GIST_FILENAME }}
        CONFIG_URL: ${{ secrets.CONFIG_URL }}
        SUBSCRIBE_LIST: ${{ secrets.SUBSCRIBE_LIST }}
  # ---------------------- 第二部分：无提交式仓库保活逻辑（核心优化） ----------------------
  keep-repo-active:
    # 触发条件：定时（每周一0点）/手动选择keep_alive
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '55 19 1 * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_task == 'keep_alive')
    runs-on: ubuntu-latest
    name: Keep Repository Active (No Commit)
    # 保活任务独立权限（最小化）
    permissions:
      actions: write  # 仅需要触发workflow的权限，无需代码写权限
    steps:
      # 核心：调用GitHub API触发空运行，无提交、无推送
      - name: Trigger dummy workflow to keep repo active
        run: |
          # 构造API请求，触发当前workflow手动运行（仅生成活动记录，无代码变更）
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \  # 使用内置token，无需手动创建PAT
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow_id }}/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
        continue-on-error: true  # 容错：重复触发报错不影响任务

# 主工作流名称：Python定时脚本 + 仓库活跃保持
name: Run Python Script on Schedule (No Commit)

# ====================== 全局配置 ======================
permissions:
  actions: write  # 保活任务需要的最小权限（Python脚本无需额外权限）

# ====================== 触发规则区（统一管理） ======================
on:
  schedule:
    - cron: "55 20 * * *"   # Python脚本定时，每天 北京时间(UTC+8)  04:55 执行（需根据您的时区换算）
    - cron: "55 19 1 * *"   # 每周一 北京时间(UTC+8) 03:55 保持活跃
  workflow_dispatch:        # 可手动触发
    inputs:
      run_task:
        description: '选择要运行的任务'
        required: false
        default: 'python_script'
        type: choice
        options:
          - python_script  # 仅运行Python脚本
          - keep_alive     # 仅保持仓库活跃

# ====================== 任务区（完全拆分为两个独立Job） ======================
jobs:
  # ---------------------- 第一部分：Python脚本运行逻辑 ----------------------
  run-script:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '55 20 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_task == 'python_script') ||
      (github.event_name == 'workflow_dispatch' && !github.event.inputs.run_task)
    runs-on: windows-latest       # 分配的虚拟机环境
    environment: ConfigConvert    # 关键：指定使用的环境，才能访问对应的环境级Secret
    name: Run Python Scheduled Script

    steps:
    # 步骤1：拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 步骤2：配置Python环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 步骤3：安装依赖 (已根据重构后的架构优化)
    # 移除了无效的 controller 和 json5，仅保留重构后实际使用的库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests PyYAML regex

    # 步骤4：运行重构后的入口脚本
    - name: Run main script
      run: |
        python main.py
      env:
        PYTHONIOENCODING: utf-8
        ACTIONS_STEP_DEBUG: true
        ACTIONS_RUNNER_DEBUG: true
        # 环境变量将由 config.py 统一接管读取
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
        GIST_FILENAME: ${{ secrets.GIST_FILENAME }}
        CONFIG_URL: ${{ secrets.CONFIG_URL }}
        SUBSCRIBE_LIST: ${{ secrets.SUBSCRIBE_LIST }}

  # ---------------------- 第二部分：无提交式仓库保活逻辑 ----------------------
  keep-repo-active:
    # 触发条件：定时/手动选择keep_alive
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '55 19 1 * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_task == 'keep_alive')
    runs-on: ubuntu-latest
    name: Keep Repository Active (No Commit)
    permissions:
      actions: write  # 仅需要触发workflow的权限
    steps:
      # 核心：调用GitHub API触发空运行，无提交、无推送
      - name: Trigger dummy workflow to keep repo active
        run: |
          WORKFLOW_NAME="python-cron.yml"
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_NAME}/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
        continue-on-error: true  # 容错：重复触发报错不影响任务